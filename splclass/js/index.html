    <script>

        function findEmptyFields(obj) {
            const emptyFields = [];

            for (let key in obj) {
                if (obj[key] === null || obj[key] === undefined || obj[key] === "") {
                    emptyFields.push(key);
                }
            }

            return emptyFields;
        }

        // Example usage
        const user = {
            name: "John",
            age: null,
            email: undefined,
            phone: ""
        };

        console.log(findEmptyFields(user));
        // Output: ["age", "email", "phone"]
    </script>

    <script>
        function makeCounter() {
            let count = 0; // private variable

            return function () {
                count++;
                return count;
            };
        }

        // Usage
        const c1 = makeCounter();
        const c2 = makeCounter();

        console.log(c1()); // 1
        console.log(c1()); // 2
        console.log(c2()); // 1
    </script>

    <script>

        function reverseString(str) {
            let result = '';

            for (let i = str.length - 1; i >= 0; i--) {
                result += str[i];
            }

            return result;
        }
        console.log(reverseString("hello")); // "olleh"


    </script>
